<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EaseGPT，让 AI 更简单</title>
    <link rel="stylesheet" href="/ai.css?v=8">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" aria-label="最近会话">
            <div class="brand-header">
                <a href="/" class="brand-link"><img class="brand-logo" src="/assets/easegpt.svg" alt=""><span class="brand-copy"><strong>EaseGPT</strong><span>企业级 AI 应用平台</span></span></a>
                <button id="collapseButton" class="sidebar-collapse" type="button" aria-label="收起左侧栏" title="收起左侧栏"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16m7-11-3 3 3 3"/></svg></button>
            </div>
            <a class="new-chat" href="#" id="newChatButton"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15a3 3 0 0 1-3 3H9l-5 3v-6a3 3 0 0 1-1-2.24V7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v8Z"/><path d="M8 9h8M8 13h5"/></svg><span>新对话</span></a>
            <section class="recent-section">
                <h2>最近</h2>
                <div id="recentList" class="recent-list"></div>
            </section>
        </aside>

        <main class="chat-panel">
            <header class="chat-header">
                <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="打开侧边栏">☰</button>
                <span id="workflowTitle" class="workflow-title">正在加载对话 Agent...</span>
                <div class="chat-header-spacer"></div>
                <button id="shareButton" class="share-button" type="button" title="分享" aria-label="分享">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V3m0 0L7 8m5-5 5 5"/><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>
                </button>
            </header>

            <section id="messages" class="messages"></section>

            <form id="composerForm" class="composer">
                <div id="fileList" class="file-list"></div>
                <div class="composer-box">
                    <label class="file-button" for="fileInput" title="上传文件">+</label>
                    <textarea id="questionInput" rows="1" placeholder="给对话 Agent 发送消息"></textarea>
                    <button id="stopButton" type="button" title="终止执行" aria-label="终止执行" hidden>
                        <span aria-hidden="true"></span>
                    </button>
                    <button id="sendButton" type="submit">发送</button>
                </div>
                <input id="fileInput" type="file" multiple accept="image/*,.txt,.md,.json,.csv,.log,text/*,application/json">
                <p id="statusText" class="status">准备就绪</p>
            </form>
        </main>
    </div>

    <script src="/sse-client.js?v=1"></script>
    <script src="/agent-run.js?v=3"></script>
</body>
</html>
