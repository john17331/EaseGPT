<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EaseGPT，让AI变简单</title>
    <link rel="stylesheet" href="/dashboard.css?v=16">
</head>
<body>
    <div class="admin-shell">
        <aside class="admin-sidebar" id="sidebar">
            <div class="brand-header">
                <a class="admin-brand" href="/"><img class="brand-logo" src="/assets/easegpt.svg" alt=""><span class="brand-copy"><strong>EaseGPT</strong><span>企业级 AI 应用平台</span></span></a>
                <button id="collapseButton" class="sidebar-collapse" type="button" aria-label="缩小左侧栏" title="缩小左侧栏"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16m7-11-3 3 3 3"/></svg></button>
            </div>
            <nav class="admin-nav" aria-label="后台导航">
                <a href="/" class="admin-nav-item" data-view="home"><img class="nav-icon" src="/assets/home.svg" alt="">首页</a>
                <a href="/?view=apps" class="admin-nav-item" data-view="apps"><img class="nav-icon" src="/assets/robot.svg" alt="">Agent 门户</a>
                <a href="/studio" class="admin-nav-item"><img class="nav-icon" src="/assets/ai1.svg" alt="">Agent 创作</a>
            </nav>
            <section class="sidebar-recent" aria-label="最近访问">
                <h2>最近</h2>
                <div id="sidebarRecentList" class="sidebar-recent-list"></div>
            </section>
            <div class="admin-sidebar-footer">
                <a href="/knowledge" class="sidebar-user" aria-label="用户设置"><span class="user-avatar"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4.5 21a7.5 7.5 0 0 1 15 0"/></svg></span><span class="user-label">用户</span></a>
            </div>
        </aside>

        <main class="admin-main">
            <button id="settingsButton" class="settings-button" type="button" aria-label="设置" title="设置">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.08A1.7 1.7 0 0 0 8.94 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.57 15 1.7 1.7 0 0 0 3 14H3v-4h.08A1.7 1.7 0 0 0 4.6 8.94a1.7 1.7 0 0 0-.34-1.88L4.2 7l2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.57 1.7 1.7 0 0 0 10 3.08V3h4v.08A1.7 1.7 0 0 0 15.06 4.6a1.7 1.7 0 0 0 1.88-.34L17 4.2 19.83 7l-.06.06A1.7 1.7 0 0 0 19.43 9 1.7 1.7 0 0 0 21 10h.08v4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg>
            </button>

            <section id="homeView" class="view home-view" aria-label="首页">
                <div class="hero-glow" aria-hidden="true"></div>
                <div class="hero-content">
                    <div class="hero-badge"><span></span>企业级 · 安全 · 可控</div>
                    <p class="hero-brand">EaseGPT</p>
                    <h1>让 AI 更简单</h1>
                    <p class="hero-subtitle">构建 AI 驱动的企业级应用服务，让智能真正服务于业务</p>
                    <div class="hero-actions">
                        <a class="hero-button primary" href="/?view=apps">进入 Agent 门户</a>
                        <a class="hero-button secondary" href="/studio">开始创作</a>
                    </div>
                </div>
                <div id="quickAppHome" class="quick-app-home" hidden>
                    <iframe id="quickAppFrame" title="快捷应用运行界面"></iframe>
                </div>
            </section>

            <section id="appsView" class="view" hidden>
                <div class="view-heading">
                    <h1>Agent 门户</h1>
                    <label class="workflow-search" for="workflowSearchInput">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
                        <input id="workflowSearchInput" type="search" placeholder="搜索 Agent 名称" autocomplete="off">
                    </label>
                </div>
                <div class="tabs" role="tablist"><button class="tab active" data-tab="mine" type="button">我的 Agent</button><button class="tab" data-tab="team" type="button">企业 Agent</button></div>
                <div id="appGrid" class="app-grid"></div>
                <div id="appsEmpty" class="content-empty apps-empty" hidden><strong id="appsEmptyTitle">暂无 Agent</strong><span id="appsEmptyDescription">当前分类还没有 Agent</span></div>
            </section>

        </main>
    </div>
    <dialog id="settingsDialog" class="settings-dialog">
        <form method="dialog">
            <div class="dialog-header"><h2>设置</h2><button id="closeSettingsButton" class="dialog-close-button" type="button" aria-label="关闭">×</button></div>
            <div class="settings-tabs" role="tablist"><button class="settings-tab active" data-settings-tab="home" type="button">首页配置</button><button class="settings-tab" data-settings-tab="agents" type="button">我的 Agent</button></div>
            <section id="homeSettingsPanel" class="settings-panel">
                <label class="settings-field">快捷应用<select id="quickAppSelect"><option value="">不启用快捷应用</option></select></label>
                <p class="settings-hint">选择后，首页会直接显示该工作流的运行界面。</p>
            </section>
            <section id="agentsSettingsPanel" class="settings-panel" hidden>
                <div class="settings-hint">从企业 Agent 中添加到“我的 Agent”。</div>
                <div id="agentPickList" class="agent-pick-list"></div>
            </section>
            <div class="dialog-actions"><button class="primary-button" type="submit">完成</button></div>
        </form>
    </dialog>
    <div id="toast" class="toast" role="status"></div>
    <script src="/dashboard.js?v=10"></script>
</body>
</html>
